name: Create Release

on: 
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller

      - name: Build our application
        run: pyinstaller --onefile --noconfirm --clean --name aps aws.py

      - name: Generate Changelog
        run: echo "# Good things have arrived" > ${{ github.ref_name }}-CHANGELOG.txt

      # https://github.com/softprops/action-gh-release
      - name: Create Release on Github
        uses: softprops/action-gh-release@v2
        with:
          body: "Some test"
          files: ${{ github.ref_name }}-CHANGELOG.txt
          repository: exitfound/aws-profile-switcher
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}

